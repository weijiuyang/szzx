name: Build Windows App

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version, for example 0.1.1. Leave empty to only build an artifact."
        required: false
        default: ""
      release_notes:
        description: "Release notes"
        required: false
        default: "Windows build"
  push:
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build exe
        shell: pwsh
        env:
          SKIP_SMOKE_TEST: "1"
        run: .\scripts\build_windows.ps1

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: SZZXLocalDesk-windows
          path: dist/SZZXLocalDesk.exe

      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && inputs.release_version != '')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.release_version) }}
          name: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || format('v{0}', inputs.release_version) }}
          body: ${{ github.event_name == 'workflow_dispatch' && inputs.release_notes || '' }}
          make_latest: true
          files: dist/SZZXLocalDesk.exe
