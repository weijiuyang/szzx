name: Build Windows App

on:
  workflow_dispatch:
  push:
    branches:
      - "**"
    tags:
      - "v*"

jobs:
  build-windows:
    runs-on: windows-latest
    env:
      TENCENT_COS_SECRET_ID: ${{ secrets.TENCENT_COS_SECRET_ID }}
      TENCENT_COS_SECRET_KEY: ${{ secrets.TENCENT_COS_SECRET_KEY }}
      TENCENT_COS_BUCKET: ${{ secrets.TENCENT_COS_BUCKET }}
      TENCENT_COS_REGION: ${{ secrets.TENCENT_COS_REGION }}
      TENCENT_COS_PUBLIC_BASE_URL: ${{ secrets.TENCENT_COS_PUBLIC_BASE_URL }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure default update URL
        if: ${{ env.TENCENT_COS_BUCKET != '' && env.TENCENT_COS_REGION != '' }}
        shell: pwsh
        run: |
          $publicBaseUrl = $env:TENCENT_COS_PUBLIC_BASE_URL.TrimEnd("/")
          if ($publicBaseUrl -eq "") {
            $publicBaseUrl = "https://$env:TENCENT_COS_BUCKET.cos.$env:TENCENT_COS_REGION.myqcloud.com"
          }
          $updateUrl = "$publicBaseUrl/windows/latest/update.json"
          @"
          from __future__ import annotations


          DEFAULT_UPDATE_URL = "$updateUrl"
          "@ | Set-Content -Encoding UTF8 szzx_local/update_config.py
          Write-Host "Default update URL: $updateUrl"

      - name: Build exe
        shell: pwsh
        env:
          SKIP_SMOKE_TEST: "1"
        run: .\scripts\build_windows.ps1

      - name: Upload exe
        uses: actions/upload-artifact@v4
        with:
          name: SZZXLocalDesk-windows
          path: dist/SZZXLocalDesk.exe

      - name: Upload exe to Tencent COS
        if: ${{ env.TENCENT_COS_SECRET_ID != '' && env.TENCENT_COS_SECRET_KEY != '' && env.TENCENT_COS_BUCKET != '' && env.TENCENT_COS_REGION != '' }}
        shell: pwsh
        env:
          GITHUB_REF_NAME: ${{ github.ref_name }}
        run: |
          python -m pip install cos-python-sdk-v5
          $latestExeKey = "windows/latest/SZZXLocalDesk.exe"
          $latestManifestKey = "windows/latest/update.json"
          $publicBaseUrl = $env:TENCENT_COS_PUBLIC_BASE_URL.TrimEnd("/")
          if ($publicBaseUrl -eq "") {
            $publicBaseUrl = "https://$env:TENCENT_COS_BUCKET.cos.$env:TENCENT_COS_REGION.myqcloud.com"
          }
          $downloadUrl = "$publicBaseUrl/$latestExeKey"
          $appVersion = python -c "from szzx_local.version import APP_VERSION; print(APP_VERSION)"
          $manifest = [ordered]@{
            version = $appVersion
            download_url = $downloadUrl
            notes = "Windows build from $env:GITHUB_REF_NAME"
          } | ConvertTo-Json -Depth 3
          $manifest | Set-Content -Encoding UTF8 update.json
          @"
          import os
          import time
          from qcloud_cos import CosConfig, CosS3Client

          config = CosConfig(
              Region=os.environ["TENCENT_COS_REGION"],
              SecretId=os.environ["TENCENT_COS_SECRET_ID"],
              SecretKey=os.environ["TENCENT_COS_SECRET_KEY"],
          )
          client = CosS3Client(config)

          def upload_with_retry(local_path: str, key: str) -> None:
              last_error = None
              for attempt in range(1, 6):
                  try:
                      print(f"Uploading {local_path} -> {key} (attempt {attempt}/5)")
                      with open(local_path, "rb") as file:
                          client.put_object(
                              Bucket=os.environ["TENCENT_COS_BUCKET"],
                              Body=file,
                              Key=key,
                              EnableMD5=False,
                          )
                      return
                  except Exception as exc:
                      last_error = exc
                      wait_seconds = min(30, attempt * 6)
                      print(f"Upload failed: {exc}. Retrying in {wait_seconds}s...")
                      time.sleep(wait_seconds)
              raise last_error

          upload_with_retry("dist/SZZXLocalDesk.exe", os.environ["LATEST_EXE_KEY"])
          upload_with_retry("dist/SZZXLocalDesk.exe", os.environ["VERSIONED_EXE_KEY"])
          upload_with_retry("update.json", os.environ["LATEST_MANIFEST_KEY"])
          print(f"Uploaded latest exe: {os.environ['LATEST_EXE_KEY']}")
          print(f"Uploaded versioned exe: {os.environ['VERSIONED_EXE_KEY']}")
          print(f"Uploaded update manifest: {os.environ['LATEST_MANIFEST_KEY']}")
          "@ | Set-Content -Encoding UTF8 upload_to_cos.py
          $env:LATEST_EXE_KEY = $latestExeKey
          $env:VERSIONED_EXE_KEY = "windows/$appVersion/SZZXLocalDesk.exe"
          $env:LATEST_MANIFEST_KEY = $latestManifestKey
          python upload_to_cos.py
